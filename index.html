<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data Save (iPhone Version)</title>
</head>
<body>
    <h1>User Data Save</h1>

    <form id="userDataForm">
        <label>Email:</label><br>
        <input type="text" id="email"><br><br>

        <label>Password:</label><br>
        <input type="password" id="password"><br><br>

        <button type="submit">Save Data</button>
    </form>

    <br>

    <button onclick="downloadData()">Download userdata.json</button>

    <h2>Gespeicherte Daten:</h2>
    <pre id="output"></pre>

    <script>
        const form = document.getElementById('userDataForm');
        const output = document.getElementById('output');

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            output.textContent = JSON.stringify(users, null, 2);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];

            users.push({ email, password });

            localStorage.setItem('users', JSON.stringify(users));

            alert('Gespeichert (nur auf deinem Gerät)');
            loadUsers();
        });

        function downloadData() {
            const data = localStorage.getItem('users') || "[]";
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "userdata.json";
            a.click();
        }

        loadUsers();
    </script>
</body>
</html>
